<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lista de Tarefas</title>
  <link rel="stylesheet" href="/Trabalho-1-BIM/src/styles/exerc09.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="page">

    <div class="header">
      <h1>Lista de tarefas</h1>
      <p>Organize e acompanhe suas atividades</p>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="stat-label">Total</div>
        <div class="stat-value" id="s-total">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Concluídas</div>
        <div class="stat-value" id="s-done">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Pendentes</div>
        <div class="stat-value" id="s-pending">0</div>
      </div>
    </div>

    <div class="add-row">
      <input type="text" id="new-task" placeholder="Nova tarefa..." />
      <button class="btn btn-primary" onclick="addTask()">+ Adicionar</button>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">Todas</button>
      <button class="filter-btn" onclick="setFilter('pending', this)">Pendentes</button>
      <button class="filter-btn" onclick="setFilter('done', this)">Concluídas</button>
    </div>

    <div class="card" id="task-list"></div>

  </div>
