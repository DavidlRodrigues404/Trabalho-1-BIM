<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <title>Button - David Rodrigues</title>
  <link rel="stylesheet" href="/src/styles/exerc08.css" />
  <link rel="shortcut icon" href="/src/assets/favicon-32x32.png" type="image/x-icon">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <button class="btn-voltar" onclick="history.back()">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5" />
        <path d="M12 19l-7-7 7-7" />
      </svg>
      Voltar
    </button>
    <span class="navbar-logo">STORE</span>
    <div class="navbar-actions">
      <button class="icon-btn" title="Favoritos">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
        </svg>
      </button>
      <button class="icon-btn" title="Carrinho">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1" />
          <circle cx="20" cy="21" r="1" />
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
        </svg>
      </button>
    </div>
  </nav>

  <!-- PRODUTO -->
  <main class="produto-container">

    <!-- Imagem do produto -->
    <section class="produto-imagem">
      <div class="badge">Novo</div>
      <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500&q=80" alt="Relógio Premium" />
    </section>

    <!-- Detalhes do produto -->
    <section class="produto-detalhes">
      <p class="produto-categoria">Relógios · Edição Limitada</p>
      <h1 class="produto-titulo">Chrono Apex Pro</h1>

      <p class="produto-descricao">
        Um relógio de precisão suíça com mostrador em safira, caixa em titânio escovado
        e resistência à água de 200m. Design atemporal para quem não abre mão do detalhe.
      </p>

      <div class="produto-avaliacao">
        <span class="estrelas">★★★★★</span>
        <span class="reviews">4.9 · 312 avaliações</span>
      </div>

      <div class="produto-preco">
        <span class="preco-original">R$ 2.199,00</span>
        <span class="preco-atual">R$ 1.749,90</span>
        <span class="desconto">-20%</span>
      </div>

      <div class="produto-opcoes">
        <p class="opcao-label">Cor</p>
        <div class="cores">
          <button class="cor-btn ativo" style="background:#c0a96e;" title="Dourado"></button>
          <button class="cor-btn" style="background:#b0b8c1;" title="Prata"></button>
          <button class="cor-btn" style="background:#1a1a1a;" title="Preto"></button>
        </div>
      </div>

      <!-- Botão de compra com box-sizing -->
      <button class="btn-comprar">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1" />
          <circle cx="20" cy="21" r="1" />
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
        </svg>
        Comprar Agora
      </button>

      <button class="btn-favoritar">
        ♡ Adicionar à lista de desejos
      </button>

    </section>
  </main>

</body>

</html>
