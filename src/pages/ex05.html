<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Meu Portfólio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/Trabalho-1-BIM/src/styles/exerc05.css">
</head>
<body>
    <header>
        <nav>
            <h1><a href="index.html">Meu Portfólio</a></h1>
            <ul>
                <li><a href="index.html#projetos">Projetos</a></li>
                <li><a href="contact.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contact-section">
            <h2>Entre em Contato</h2>
            <p>Envie-me uma mensagem. Responderei o mais breve possível!</p>

            <form action="#" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">Seu Nome:</label>
                    <input type="text" id="name" name="name" placeholder="Digite seu nome completo" required>
                </div>

                <div class="form-group">
                    <label for="email">Seu Email:</label>
                    <input type="email" id="email" name="email" placeholder="seu.email@exemplo.com" required>
                </div>

                <div class="form-group">
                    <label for="subject">Assunto:</label>
                    <input type="text" id="subject" name="subject" placeholder="Qual o assunto da mensagem?">
                </div>

                <div class="form-group">
                    <label for="message">Sua Mensagem:</label>
                    <textarea id="message" name="message" rows="6" placeholder="Escreva sua mensagem aqui..." required></textarea>
                </div>

                <button type="submit" class="btn">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Meu Portfólio. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
