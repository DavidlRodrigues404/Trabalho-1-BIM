<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Arquivo CSS externo -->
  <link rel="stylesheet" href="/Trabalho-1-BIM/src/styles/exerc07.css"/>
</head>
<body>

  <div class="card">
    <div class="logo">Acesso seguro</div>

    <h1>Bem-vindo<br>de volta.</h1>
    <p class="subtitle">Entre com suas credenciais para continuar.</p>

    <!-- Campo: nome de usuário -->
    <div class="field">
      <label for="usuario">Usuário</label>
      <!--
        TAG <input> — campo de texto para nome de usuário
        A propriedade CSS 'border' estiliza a linha ao redor do campo (definida no style.css).
      -->
      <input
        type="text"
        id="usuario"
        name="usuario"
        placeholder="seu@email.com"
        autocomplete="username"
      />
    </div>

    <!-- Campo: senha -->
    <div class="field">
      <label for="senha">Senha</label>
      <!--
        TAG <input> — campo de senha (type="password" oculta os caracteres)
        A propriedade CSS 'border' define borda diferente no :focus (definida no style.css).
      -->
      <input
        type="password"
        id="senha"
        name="senha"
        placeholder="••••••••"
        autocomplete="current-password"
      />
      <span class="field-icon" title="Mostrar/ocultar senha"
            onclick="toggleSenha()">👁</span>
    </div>

    <div class="options">
      <label class="remember">
        <!--
          TAG <input type="checkbox"> — também estilizado com border no style.css
        -->
        <input type="checkbox" id="lembrar" />
        Lembrar de mim
      </label>
      <a href="#" class="forgot">Esqueceu a senha?</a>
    </div>

    <button class="btn" onclick="entrar()">Entrar</button>

    <div class="divider">ou</div>

    <div class="footer">
      Não tem conta? <a href="#">Criar conta gratuita</a>
    </div>
  </div>

</body>
</html>
