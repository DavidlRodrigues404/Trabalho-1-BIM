<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="/src/styles/exerc07.css" />
  <link rel="shortcut icon" href="/src/assets/favicon-32x32.png" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="login-card">

    <h1 class="login-title">Bem-vindo de volta</h1>
    <p class="login-subtitle">Entre na sua conta para continuar</p>

    <div class="field-group">
      <label class="field-label" for="username">Nome de usuário</label>
      <input type="text" id="username" name="username" placeholder="seu_usuario" autocomplete="username" />
    </div>

    <div class="field-group">
      <div class="field-row">
        <label class="field-label" for="password">Senha</label>
        <a href="#" class="forgot-link">Esqueceu a senha?</a>
      </div>
      <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" />
    </div>

    <button class="btn-login">Entrar</button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">ou</span>
      <div class="divider-line"></div>
    </div>

    <p class="signup-text">
      Não tem uma conta? <a href="#" class="signup-link">Criar conta</a>
    </p>

  </div>

</body>
</html>
